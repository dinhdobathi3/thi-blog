<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="780" viewBox="0 0 1440 780" role="img" aria-labelledby="title desc">
  <title id="title">n8n Gateway Validation Pipeline</title>
  <desc id="desc">Request validation steps: route lookup, provider verification, channel rules, forwarding signature, retries, and delivery logs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop stop-color="#172033"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="780" fill="url(#bg)"/>
  <circle cx="1180" cy="90" r="230" fill="#2563eb" opacity=".13"/>
  <circle cx="190" cy="650" r="260" fill="#a855f7" opacity=".12"/>
  <text x="76" y="86" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">Validation before forwarding</text>
  <text x="78" y="126" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="20">Every request must earn its way into the private automation zone.</text>

  <g transform="translate(90 220)">
    <rect width="196" height="220" rx="24" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <text x="28" y="56" fill="#38bdf8" font-family="JetBrains Mono, monospace" font-size="17">01</text>
    <text x="28" y="94" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Route</text>
    <text x="28" y="132" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">Look up slug</text>
    <text x="28" y="162" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="14">/{slug}/webhook</text>
  </g>
  <g transform="translate(328 220)">
    <rect width="196" height="220" rx="24" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <text x="28" y="56" fill="#38bdf8" font-family="JetBrains Mono, monospace" font-size="17">02</text>
    <text x="28" y="94" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Verify</text>
    <text x="28" y="132" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">Slack HMAC</text>
    <text x="28" y="162" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">GChat JWT</text>
  </g>
  <g transform="translate(566 220)">
    <rect width="196" height="220" rx="24" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <text x="28" y="56" fill="#38bdf8" font-family="JetBrains Mono, monospace" font-size="17">03</text>
    <text x="28" y="94" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Decide</text>
    <text x="28" y="132" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">Channel rule</text>
    <text x="28" y="162" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">Drop unknowns</text>
  </g>
  <g transform="translate(804 220)">
    <rect width="196" height="220" rx="24" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <text x="28" y="56" fill="#38bdf8" font-family="JetBrains Mono, monospace" font-size="17">04</text>
    <text x="28" y="94" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Forward</text>
    <text x="28" y="132" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">Inject headers</text>
    <text x="28" y="162" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">Sign body</text>
  </g>
  <g transform="translate(1042 220)">
    <rect width="196" height="220" rx="24" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <text x="28" y="56" fill="#38bdf8" font-family="JetBrains Mono, monospace" font-size="17">05</text>
    <text x="28" y="94" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Record</text>
    <text x="28" y="132" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">Retries</text>
    <text x="28" y="162" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">Delivery log</text>
  </g>
  <g fill="none" stroke="url(#accent)" stroke-linecap="round" stroke-width="5">
    <path d="M286 330h42M524 330h42M762 330h42M1000 330h42"/>
  </g>
  <g fill="#38bdf8">
    <path d="m323 317 22 13-22 13z"/>
    <path d="m561 317 22 13-22 13z"/>
    <path d="m799 317 22 13-22 13z"/>
    <path d="m1037 317 22 13-22 13z"/>
  </g>
  <rect x="250" y="560" width="940" height="92" rx="20" fill="#020617" stroke="#38bdf8" stroke-opacity=".32" stroke-width="2"/>
  <text x="298" y="616" fill="#dbeafe" font-family="JetBrains Mono, monospace" font-size="22">X-Gateway-Route · X-Gateway-Delivery-Id · X-Gateway-Timestamp · X-Gateway-Signature</text>
</svg>
