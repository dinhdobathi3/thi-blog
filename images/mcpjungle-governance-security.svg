<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">MCPJungle Governance and Security Model</title>
  <desc id="desc">Enterprise governance uses users, groups, MCP clients, token scopes, admin guards, redaction, and observability around the MCPJungle gateway.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1440" y1="0" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/>
      <stop offset=".55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#052e2b"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" x2="1">
      <stop stop-color="#22c55e"/>
      <stop offset=".5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <g opacity=".24" stroke="#38bdf8" stroke-width="1">
    <path d="M80 160h1280M80 280h1280M80 400h1280M80 520h1280M80 640h1280"/>
    <path d="M220 70v680M420 70v680M620 70v680M820 70v680M1020 70v680M1220 70v680"/>
  </g>
  <text x="78" y="92" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">Governance around the tool gateway</text>
  <text x="80" y="132" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="20">MCP access is useful only when identities, scopes, and dangerous details are controlled.</text>

  <path d="M720 206 934 292v160c0 160-214 252-214 252S506 612 506 452V292z" fill="url(#shield)" opacity=".2" stroke="url(#shield)" stroke-width="6"/>
  <text x="645" y="428" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">MCPJungle</text>
  <text x="603" y="470" fill="#dbeafe" font-family="JetBrains Mono, monospace" font-size="18">users · clients · groups · tokens</text>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(110 228)">
      <rect width="330" height="116" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-opacity=".45" stroke-width="2"/>
      <text x="26" y="44" fill="#f8fafc" font-size="22" font-weight="800">Users</text>
      <text x="26" y="78" fill="#cbd5e1" font-size="16">Human admins and operators</text>
    </g>
    <g transform="translate(1000 228)">
      <rect width="330" height="116" rx="18" fill="#0f172a" stroke="#a855f7" stroke-opacity=".45" stroke-width="2"/>
      <text x="26" y="44" fill="#f8fafc" font-size="22" font-weight="800">MCP clients</text>
      <text x="26" y="78" fill="#cbd5e1" font-size="16">Claude, Cursor, Codex tokens</text>
    </g>
    <g transform="translate(110 392)">
      <rect width="330" height="116" rx="18" fill="#0f172a" stroke="#22c55e" stroke-opacity=".45" stroke-width="2"/>
      <text x="26" y="44" fill="#f8fafc" font-size="22" font-weight="800">Groups</text>
      <text x="26" y="78" fill="#cbd5e1" font-size="16">Inherited server allow-lists</text>
    </g>
    <g transform="translate(1000 392)">
      <rect width="330" height="116" rx="18" fill="#0f172a" stroke="#f59e0b" stroke-opacity=".45" stroke-width="2"/>
      <text x="26" y="44" fill="#f8fafc" font-size="22" font-weight="800">Admin guards</text>
      <text x="26" y="78" fill="#cbd5e1" font-size="16">Init token, loopback, RBAC</text>
    </g>
    <g transform="translate(110 556)">
      <rect width="330" height="116" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-opacity=".45" stroke-width="2"/>
      <text x="26" y="44" fill="#f8fafc" font-size="22" font-weight="800">Redaction</text>
      <text x="26" y="78" fill="#cbd5e1" font-size="16">Hide stdio command/env details</text>
    </g>
    <g transform="translate(1000 556)">
      <rect width="330" height="116" rx="18" fill="#0f172a" stroke="#22c55e" stroke-opacity=".45" stroke-width="2"/>
      <text x="26" y="44" fill="#f8fafc" font-size="22" font-weight="800">Telemetry</text>
      <text x="26" y="78" fill="#cbd5e1" font-size="16">Prometheus, OTEL, structured logs</text>
    </g>
  </g>
  <g stroke="#64748b" stroke-width="3" stroke-linecap="round">
    <path d="M440 286h90M910 286h90M440 450h80M920 450h80M440 614h110M890 614h110"/>
  </g>
</svg>
