    <text x="28" y="56" fill="#38bdf8" font-family="JetBrains Mono, monospace" font-size="17">02</text>
    <text x="28" y="94" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Scope</text>
