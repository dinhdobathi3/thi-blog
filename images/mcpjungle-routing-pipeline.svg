    <text x="28" y="162" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">allow-list</text>
  </g>
  <g transform="translate(544 218)">
    <rect width="190" height="230" rx="24" fill="url(#card)" stroke="#334155" stroke-width="2"/>
    <text x="28" y="56" fill="#38bdf8" font-family="JetBrains Mono, monospace" font-size="17">03</text>
    <text x="28" y="94" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Name</text>
    <text x="28" y="132" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">Canonical</text>
    <text x="28" y="162" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="14">server__tool</text>
  </g>
  <g transform="translate(772 218)">
