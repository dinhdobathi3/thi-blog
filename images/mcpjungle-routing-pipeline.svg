<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="780" viewBox="0 0 1440 780" role="img" aria-labelledby="title desc">
  <title id="title">MCPJungle Tool Invocation Pipeline</title>
  <desc id="desc">MCPJungle authenticates client tokens, resolves allow-lists, canonicalizes tools, proxies upstream MCP calls, and records metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop stop-color="#172033"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="780" fill="url(#bg)"/>
  <circle cx="1160" cy="110" r="260" fill="#2563eb" opacity=".13"/>
  <circle cx="210" cy="660" r="260" fill="#a855f7" opacity=".12"/>
  <text x="76" y="86" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">Tool calls through one governed path</text>
  <text x="78" y="126" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="20">The proxy path stays stable while access and upstream selection remain centralized.</text>

