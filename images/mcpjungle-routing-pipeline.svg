    <text x="28" y="94" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Token</text>
    <text x="28" y="132" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="16">Client auth</text>
    <text x="28" y="162" fill="#94a3b8" font-family="JetBrains Mono, monospace" font-size="14">Bearer ...</text>
  </g>
  <g transform="translate(316 218)">
